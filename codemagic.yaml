workflows:
  android-debug:
    name: PathShare Debug Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        # 1. Update this to your actual app package name
        PACKAGE_NAME: "com.pathshare.app"
        JAVA_VERSION: "17"
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug APK
        script: |
          # This ensures the build script has permission to run
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          # 2. REPLACE THIS with your actual email address
          - s.shakir.h@gmail.com
        notify:
          success: true
          failure: true