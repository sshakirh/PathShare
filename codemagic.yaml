workflows:
  android-debug:
    name: PathShare Diagnostic Build
    max_build_duration: 10
    instance_type: mac_mini_m2

    environment:
      vars:
        PACKAGE_NAME: "com.pathshare.app"
        JAVA_VERSION: "17"
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true

    scripts:
      - name: List Files to Find Gradlew
        script: |
          echo "Current directory is: $(pwd)"
          echo "Listing all files in the root:"
          ls -R