workflows:
  android-workflow:
    name: PathShare Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      # Use groups for your Firebase/API secrets later
      groups:
        - default 
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Set up local.properties
        script: | 
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android APK
        script: | 
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - s.shakir.h@gmail.com